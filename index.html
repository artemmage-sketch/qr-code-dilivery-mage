<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#7740F3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mage Delivery">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Mage Delivery · Сканер чеків</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #F6EFFF;
    --bg2:       #EDE4FA;
    --surface:   #FFFFFF;
    --border:    #DDD3F5;
    --accent:    #7740F3;
    --accent-h:  #6530D9;
    --accent-s:  #F0EAFF;
    --text:      #1A1035;
    --muted:     #8B7BAD;
    --error:     #D94040;
    --radius:    18px;
    --shadow:    0 4px 24px rgba(119,64,243,0.10);
    --shadow-sm: 0 2px 8px rgba(119,64,243,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rubik', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 56px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -120px; right: -80px;
    width: 340px; height: 340px;
    background: radial-gradient(circle, rgba(119,64,243,0.18) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -80px; left: -60px;
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(119,64,243,0.12) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* ── Login screen ── */
  #loginScreen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    z-index: 100;
  }
  .login-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 32px 24px;
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .login-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
  }
  .login-title span { color: var(--accent); }
  .login-subtitle {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-top: -12px;
  }
  .login-fields { display: flex; flex-direction: column; gap: 12px; }
  .text-input {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'Rubik', sans-serif;
    font-size: 15px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .text-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(119,64,243,0.12);
  }
  .text-input::placeholder { color: var(--muted); opacity: 0.6; }
  .login-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 13px;
    padding: 16px;
    font-family: 'Rubik', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    box-shadow: 0 4px 16px rgba(119,64,243,0.30);
  }
  .login-btn:hover { background: var(--accent-h); }
  .login-btn:active { transform: scale(0.98); }
  .login-error {
    font-size: 13px;
    color: var(--error);
    text-align: center;
    display: none;
  }

  /* ── App screen ── */
  #appScreen { display: none; width: 100%; flex-direction: column; align-items: center; }

  header {
    width: 100%;
    padding: 40px 24px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    position: relative;
    z-index: 1;
  }
  .brand {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .brand span { color: var(--accent); }
  .tagline {
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
  }
  .logout-btn {
    position: absolute;
    top: 36px; right: 20px;
    background: var(--accent-s);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 7px 12px;
    font-family: 'Rubik', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    cursor: pointer;
    transition: background 0.2s;
  }
  .logout-btn:hover { background: var(--border); }

  main {
    width: 100%;
    max-width: 460px;
    padding: 8px 16px 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
    z-index: 1;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  /* ── Upload buttons ── */
  .upload-buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 20px;
  }
  .upload-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-family: 'Rubik', sans-serif;
    transition: transform 0.1s;
    position: relative;
    text-align: left;
    width: 100%;
  }
  .upload-btn:active { transform: scale(0.97); }
  .upload-btn input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
    font-size: 0; width: 100%; height: 100%;
  }
  .upload-btn-icon {
    width: 48px; height: 48px;
    border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }
  .upload-btn-text { display: flex; flex-direction: column; gap: 2px; }
  .upload-btn-title { font-size: 15px; font-weight: 600; line-height: 1.2; }
  .upload-btn-hint  { font-size: 12px; font-weight: 400; opacity: 0.65; }

  .btn-camera {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 16px rgba(119,64,243,0.32);
  }
  .btn-camera .upload-btn-icon { background: rgba(255,255,255,0.20); }
  .btn-gallery {
    background: var(--accent-s);
    color: var(--accent);
    border: 1.5px solid var(--border);
  }
  .btn-gallery .upload-btn-icon { background: rgba(119,64,243,0.10); }

  /* ── Preview ── */
  .preview-card {
    display: none;
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .preview-card img {
    width: 100%; display: block;
    max-height: 340px; object-fit: contain;
    background: var(--bg2);
  }
  .preview-clear {
    position: absolute; top: 12px; right: 12px;
    background: rgba(255,255,255,0.93);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px;
    box-shadow: var(--shadow-sm);
    transition: transform 0.1s;
  }
  .preview-clear:active { transform: scale(0.92); }

  /* ── Scan button ── */
  .scan-btn {
    display: none; width: 100%;
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius);
    padding: 19px;
    font-family: 'Rubik', sans-serif;
    font-size: 15px; font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 6px 22px rgba(119,64,243,0.34);
  }
  .scan-btn:hover { background: var(--accent-h); }
  .scan-btn:active { transform: scale(0.98); }
  .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ── Loading ── */
  .loading {
    display: none; flex-direction: column;
    align-items: center; gap: 16px; padding: 44px 24px;
  }
  .spinner {
    width: 46px; height: 46px;
    border: 3.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-size: 14px; font-weight: 500;
    color: var(--muted); text-align: center; line-height: 1.6;
  }

  /* ── Result ── */
  .result-header {
    background: var(--accent);
    padding: 16px 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .result-check {
    width: 30px; height: 30px;
    background: rgba(255,255,255,0.22);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0; color: #fff;
  }
  .result-header-text { font-size: 14px; font-weight: 600; color: #fff; }

  .result-fields { padding: 4px 0; }
  .field-row {
    display: flex; align-items: flex-start;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border); gap: 12px;
  }
  .field-row:last-child { border-bottom: none; }
  .field-key {
    font-size: 11px; font-weight: 600;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.07em; min-width: 100px;
    flex-shrink: 0; padding-top: 2px;
  }
  .field-val {
    font-size: 14px; font-weight: 500;
    color: var(--text); line-height: 1.5; word-break: break-word;
  }
  .field-val.big { font-size: 19px; font-weight: 700; color: var(--accent); }

  /* ── Manual fields ── */
  .manual-fields {
    padding: 16px 20px 20px;
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 10px;
  }
  .manual-label {
    font-size: 11px; font-weight: 600;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.07em; margin-bottom: 2px;
  }
  .manual-row { display: flex; gap: 10px; }
  .manual-input {
    flex: 1;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 11px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'Rubik', sans-serif;
    font-size: 14px; font-weight: 500;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    min-width: 0;
  }
  .manual-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(119,64,243,0.10);
  }
  .manual-input::placeholder { color: var(--muted); opacity: 0.5; font-weight: 400; }

  /* ── Action row ── */
  .action-row {
    display: flex; gap: 10px;
    padding: 14px;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }
  .btn {
    flex: 1; padding: 15px 10px;
    border-radius: 13px; border: none;
    font-family: 'Rubik', sans-serif;
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
    text-align: center;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: var(--accent); color: #fff;
    box-shadow: 0 4px 14px rgba(119,64,243,0.28);
  }
  .btn-primary:hover { background: var(--accent-h); }
  .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: var(--surface); color: var(--accent);
    border: 1.5px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent); background: var(--accent-s); }

  /* ── Error ── */
  .error-block {
    display: none;
    background: #FFF0F0;
    border: 1.5px solid #F5C6C6;
    border-radius: var(--radius);
    padding: 16px 18px;
    font-size: 13px; color: var(--error); line-height: 1.6;
  }

  footer {
    margin-top: 32px;
    font-size: 11px; color: var(--muted);
    opacity: 0.45; text-align: center;
  }
</style>
</head>
<body>

<!-- ── Екран авторизації ── -->
<div id="loginScreen">
  <div class="login-card">
    <div style="display:flex;flex-direction:column;gap:16px;text-align:center">
      <div class="login-title">Mage <span>Delivery</span></div>
      <div class="login-subtitle">Введіть дані для входу</div>
    </div>
    <div class="login-fields">
      <input class="text-input" type="text" id="loginInput"
        placeholder="Логін" autocomplete="username" autocorrect="off" autocapitalize="off">
      <input class="text-input" type="password" id="passwordInput"
        placeholder="Пароль" autocomplete="current-password">
    </div>
    <div class="login-error" id="loginError">Невірний логін або пароль</div>
    <button class="login-btn" onclick="doLogin()">Увійти</button>
  </div>
</div>

<!-- ── Основний екран ── -->
<div id="appScreen">

  <header>
    <div class="brand">Mage <span>Delivery</span></div>
    <div class="tagline">AI розпізнавання чеків доставки</div>
    <button class="logout-btn" onclick="doLogout()">Вийти</button>
  </header>

  <main>

    <!-- Upload -->
    <div class="card" id="uploadCard">
      <div class="upload-buttons">
        <button class="upload-btn btn-camera">
          <input type="file" accept="image/*" capture="environment"
                 id="fileCamera" onchange="handleFile(this)">
          <div class="upload-btn-icon">📷</div>
          <div class="upload-btn-text">
            <div class="upload-btn-title">Зробити фото чеку</div>
            <div class="upload-btn-hint">Відкрити камеру телефону</div>
          </div>
        </button>
        <button class="upload-btn btn-gallery">
          <input type="file" accept="image/*"
                 id="fileGallery" onchange="handleFile(this)">
          <div class="upload-btn-icon">🖼️</div>
          <div class="upload-btn-text">
            <div class="upload-btn-title">Завантажити фото</div>
            <div class="upload-btn-hint">Обрати з галереї або файлів</div>
          </div>
        </button>
      </div>
    </div>

    <!-- Preview -->
    <div class="preview-card" id="previewCard">
      <img id="previewImg" src="" alt="Чек">
      <div class="preview-clear" onclick="clearImage()">✕</div>
    </div>

    <!-- Scan button -->
    <button class="scan-btn" id="scanBtn" onclick="scanReceipt()">
      🔍 &nbsp; Розпізнати чек
    </button>

    <!-- Loading -->
    <div class="card loading" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">AI аналізує чек…<br>зазвичай 3–5 секунд</div>
    </div>

    <!-- Error -->
    <div class="error-block" id="errorBlock"></div>

    <!-- Result -->
    <div class="card" id="resultCard" style="display:none">
      <div class="result-header">
        <div class="result-check">✓</div>
        <div class="result-header-text">Дані розпізнано успішно</div>
      </div>
      <div class="result-fields" id="resultFields"></div>

      <!-- Ручні поля -->
      <div class="manual-fields">
        <div class="manual-label">Додаткові дані адреси</div>
        <div class="manual-row">
          <input class="manual-input" type="text" id="fieldPidyizd" placeholder="Під'їзд">
          <input class="manual-input" type="text" id="fieldPoverh"  placeholder="Поверх">
          <input class="manual-input" type="text" id="fieldKvart"   placeholder="Квартира">
        </div>
      </div>

      <div class="action-row">
        <button class="btn btn-primary" id="callCourierBtn" onclick="callCourier()">
          🚴 Викликати кур'єра
        </button>
        <button class="btn btn-secondary" onclick="resetAll()">Новий чек</button>
      </div>
    </div>

    <footer>MAGE DELIVERY · AI SCANNER · GPT-4o</footer>

  </main>
</div>

<script>
// ── Конфіг ─────────────────────────────────────────────
const COURIER_WEBHOOK = 'https://hook.eu2.make.com/5cke62klbfumm3uficd10h41d7ivmyb4';
const PROXY_URL       = '/.netlify/functions/scan';

const FIELDS = [
  { key: 'establishment',    label: 'Заклад'    },
  { key: 'receipt_number',   label: 'Чек №'     },
  { key: 'cashier',          label: 'Касир'     },
  { key: 'client_name',      label: 'Клієнт'    },
  { key: 'client_phone',     label: 'Телефон'   },
  { key: 'delivery_address', label: 'Адреса'    },
  { key: 'total',            label: 'До оплати' },
  { key: 'payment_method',   label: 'Оплата'    },
  { key: 'city',             label: 'Місто'     },
];

let imageBase64   = null;
let imageMime     = null;
let extractedData = null;

// ── Auth ────────────────────────────────────────────────
window.onload = () => {
  if (localStorage.getItem('mage_auth') === 'ok') {
    showApp();
  }
  // Enter для логіну
  document.getElementById('passwordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
};

async function doLogin() {
  const login    = document.getElementById('loginInput').value.trim();
  const password = document.getElementById('passwordInput').value;

  try {
    const res = await fetch('/.netlify/functions/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ login, password }),
    });
    const json = await res.json();
    if (json.ok) {
      localStorage.setItem('mage_auth', 'ok');
      showApp();
    } else {
      showLoginError();
    }
  } catch {
    showLoginError();
  }
}

function doLogout() {
  localStorage.removeItem('mage_auth');
  document.getElementById('appScreen').style.display  = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('passwordInput').value = '';
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display   = 'flex';
}

function showLoginError() {
  const el = document.getElementById('loginError');
  el.style.display = 'block';
  document.getElementById('passwordInput').value = '';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

// ── File ────────────────────────────────────────────────
function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  imageMime = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = e => {
    imageBase64 = e.target.result.split(',')[1];
    document.getElementById('previewImg').src = e.target.result;
    document.getElementById('previewCard').style.display = 'block';
    document.getElementById('uploadCard').style.display  = 'none';
    document.getElementById('scanBtn').style.display     = 'block';
    hide('resultCard'); hide('errorBlock'); hide('loading');
    extractedData = null;
  };
  reader.readAsDataURL(file);
}

function clearImage() {
  imageBase64 = null; imageMime = null; extractedData = null;
  courierCalled = false;
  const btn = document.getElementById('callCourierBtn');
  if (btn) { btn.disabled = false; btn.textContent = '🚴 Викликати кур\'єра'; btn.style.background = ''; btn.style.boxShadow = ''; }
  document.getElementById('fileCamera').value          = '';
  document.getElementById('fileGallery').value         = '';
  document.getElementById('previewCard').style.display = 'none';
  document.getElementById('uploadCard').style.display  = 'block';
  document.getElementById('scanBtn').style.display     = 'none';
  document.getElementById('fieldPidyizd').value = '';
  document.getElementById('fieldPoverh').value  = '';
  document.getElementById('fieldKvart').value   = '';
  hide('resultCard'); hide('errorBlock'); hide('loading');
}

function resetAll() { clearImage(); }

// ── Scan ────────────────────────────────────────────────
async function scanReceipt() {
  if (!imageBase64) { showError('Спочатку оберіть фото чеку.'); return; }

  show('loading', 'flex');
  hide('resultCard'); hide('errorBlock');
  document.getElementById('scanBtn').disabled = true;

  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: imageBase64, mime: imageMime }),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
    extractedData = json;
    hide('loading');
    renderResult(extractedData);
  } catch (e) {
    hide('loading');
    showError('Помилка: ' + e.message);
  } finally {
    document.getElementById('scanBtn').disabled = false;
  }
}

// ── Render ──────────────────────────────────────────────
function renderResult(data) {
  const c = document.getElementById('resultFields');
  c.innerHTML = '';
  FIELDS.forEach(f => {
    const val = data[f.key];
    if (!val && val !== 0) return;
    const row = document.createElement('div');
    row.className = 'field-row';
    const k = document.createElement('div');
    k.className = 'field-key';
    k.textContent = f.label;
    const v = document.createElement('div');
    v.className = 'field-val' + (f.key === 'total' ? ' big' : '');
    v.textContent = f.key === 'total' ? val + ' грн' : val;
    row.appendChild(k); row.appendChild(v); c.appendChild(row);
  });

  // Автозаповнення під'їзд / поверх / квартира якщо GPT їх розпізнав
  if (data.entrance)  document.getElementById('fieldPidyizd').value = data.entrance;
  if (data.floor)     document.getElementById('fieldPoverh').value  = data.floor;
  if (data.apartment) document.getElementById('fieldKvart').value   = data.apartment;

  show('resultCard', 'block');
}

// ── Call courier ─────────────────────────────────────────
let courierCalled = false;

async function callCourier() {
  if (!extractedData) return;

  // Захист від повторного натискання
  if (courierCalled) {
    alert('Кур\'єра вже викликано для цього замовлення!');
    return;
  }

  const btn = document.getElementById('callCourierBtn');
  btn.disabled = true;
  btn.textContent = 'Надсилаємо…';

  const payload = {
    ...extractedData,
    pidyizd:  document.getElementById('fieldPidyizd').value.trim() || null,
    poverh:   document.getElementById('fieldPoverh').value.trim()  || null,
    kvartira: document.getElementById('fieldKvart').value.trim()   || null,
  };

  try {
    await fetch(COURIER_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    // Блокуємо назавжди до нового чеку
    courierCalled = true;
    btn.disabled = true;
    btn.textContent = '✓ Кур\'єра викликано!';
    btn.style.background = '#22A06B';
    btn.style.boxShadow  = 'none';

  } catch {
    btn.disabled = false;
    btn.textContent = '🚴 Викликати кур\'єра';
    showError('Помилка надсилання. Спробуйте ще раз.');
  }
}

// ── Helpers ─────────────────────────────────────────────
function show(id, d = 'block') { document.getElementById(id).style.display = d; }
function hide(id)               { document.getElementById(id).style.display = 'none'; }
function showError(msg) {
  const el = document.getElementById('errorBlock');
  el.textContent = msg; el.style.display = 'block';
}
</script>
